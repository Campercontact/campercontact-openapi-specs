  /v1/locations/search:
    post:
      description: "Retrieve locations filtered by multiple states. Requires authentication."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - states
              properties:
                states:
                  type: array
                  items:
                    $ref: "#/components/schemas/LocationStatus"
                  minItems: 1
                  description: "Array of location states to filter by"
                  example: ["active", "new"]
                offset:
                  type: integer
                  default: 0
                  description: "Number of items to skip for pagination"
                limit:
                  type: integer
                  default: 50
                  maximum: 100
                  description: "Maximum number of items to return"
                hasReviews:
                  type: boolean
                  default: false
                  description: "When true, only return locations that have 1 or more reviews"
      responses:
        "200":
          description: "OK - Returns locations matching any of the provided states"
          content:
            '*/*':
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/LocationSearchResponse"
                  total:
                    type: integer
                  offset:
                    type: integer
                  limit:
                    type: integer
        "400":
          description: "Validation error (e.g. invalid states, empty array)."
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: "Unauthorized - User not authenticated."
          content:
            text/plain:
              schema:
                type: string
  /v1/locations/backlog:
    get:
      description: "GET /v1/locations/backlog <br> Retrieves all locations in the backlog for moderation. <br> Requires the user to be authenticated as a moderator. <br> Response: <br> - 200 OK: A list of locations in the backlog. <br> - 401 Unauthorized: If the user is not authenticated. <br> - 403 Forbidden: If the user does not have moderator permissions."
      responses:
