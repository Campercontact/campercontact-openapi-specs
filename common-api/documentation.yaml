  /v1/locations/reverse-geocode:
    get:
      description: "GET /v1/locations/reverse-geocode <br> Reverse-geocodes a lat/lon pair via Nominatim and returns the city, region and country that the backend would persist on save. <br> The language of the returned address fields follows the standard `Accept-Language` header (same convention as the rest of the API). <br> Requires authentication. <br> Response: <br> - 200 OK: ReverseGeocodeResponse with single-language fields and Nominatim metadata. <br> - 400 Bad Request: Missing or out-of-range coordinates. <br> - 401 Unauthorized: If the user is not authenticated."
      parameters:
        - name: "lat"
          in: "query"
          required: true
          description: "Latitude, must be in [-90, 90]."
          schema:
            type: "number"
            format: "double"
            minimum: -90
            maximum: 90
          example: 52.3676
        - name: "lon"
          in: "query"
          required: true
          description: "Longitude, must be in [-180, 180]."
          schema:
            type: "number"
            format: "double"
            minimum: -180
            maximum: 180
          example: 4.9041
      responses:
        "200":
          description: "OK - Returns the reverse-geocoded address preview"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReverseGeocodeResponse"
        "400":
          description: "Validation error - Missing/invalid lat or lon"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized - User not authenticated"
          content:
            text/plain:
              schema:
                type: string
  /v1/locations/{sitecode}/status:
    patch:
      description: "Update the status of a location. Validates that the status transition is allowed based on business rules. Requires authentication and moderator permissions."
      parameters:
        - name: "sitecode"
          in: "path"
          required: true
          description: "The site code of the location to update"
          schema:
            type: "string"
          example: "12345"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  $ref: "#/components/schemas/LocationStatus"
                rejectionReason:
                  type: string
                  allOf:
                    - $ref: "#/components/schemas/RejectionReason"
                  description: "Required when status is 'denied'. Specifies the reason for rejection."
                rejectionMessage:
                  type: string
                  description: "Required when rejectionReason is 'other_reason'. Custom rejection message."
                  example: "Location does not meet our quality standards"
            examples:
              activate:
                summary: "Activate a location"
                value:
                  status: "active"
              deny_insufficient_info:
                summary: "Deny location - insufficient information"
                value:
                  status: "denied"
                  rejectionReason: "insufficient_information"
              deny_other_reason:
                summary: "Deny location - other reason"
                value:
                  status: "denied"
                  rejectionReason: "other_reason"
                  rejectionMessage: "Location photos do not match the description"
      responses:
        "200":
          description: "OK - Status updated successfully"
        "400":
          description: "Validation error - Invalid status transition or invalid status value"
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        message:
                          type: string
              example:
                errors:
                  - path: "status"
                    message: "cannot transition from active. Valid transitions are: inactive, expired"
        "401":
          description: "Unauthorized - User not authenticated"
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: "Forbidden - User does not have moderator permissions"
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: "Location not found"
          content:
            text/plain:
              schema:
                type: string
