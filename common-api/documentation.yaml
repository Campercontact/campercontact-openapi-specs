  /v1/rentalUnits/{siteCode}:
    get:
      description: "GET /v1/rentalUnits/{siteCode} <br> Retrieves rental units\
        \ for a given site code with optional pricing information. <br> Behavior: <br>\
        \ - Without dates: Returns all rental units without pricing information <br>\
        \ - With dates: Returns only units with available pricing for the specified dates\
        \ and occupancy <br> Path Parameters: <br> - siteCode: The unique code of the\
        \ site for which rental units are being retrieved. <br> Query Parameters: <br>\
        \ - startDate: Check-in date (ISO 8601 format: YYYY-MM-DD) - Optional <br> -\
        \ endDate: Check-out date (ISO 8601 format: YYYY-MM-DD) - Optional <br> - persons:\
        \ Number of persons (default: 2) <br> - babies: Number of babies (default: 0)\
        \ <br> - pets: Number of pets (default: 0) <br> Response: <br> - 200 OK: A list\
        \ of rental units (with or without pricing based on parameters)"
