          description: "Original locale of the review text"
        text:
          type: "string"
          description: "Text content of the review (potentially translated)"
        originalText:
          type: "string"
          description: "Original text content of the review in the original language"
        sitecode:
          type: "string"
          description: "Site code of the reviewed location"
      required:
        - "originalLocale"
        - "text"
        - "originalText"
        - "sitecode"
    CreateNoteRequest:
