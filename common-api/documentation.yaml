        \ site code of the affiliate to retrieve. <br> - `poiID` <br> Int, optional\
        \ <br> : The POI ID of the affiliate to retrieve. <br> **Responses:** <br>\
        \ - 200 OK: The affiliate information was successfully retrieved. <br> - 404\
        \ Not Found: No affiliate information was found for the provided `siteCode`\
        \ or `poiID`. <br> - 400 Bad Request: If neither `siteCode` nor `poiID` is\
