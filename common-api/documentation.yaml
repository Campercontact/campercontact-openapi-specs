  /v1/rentalUnits/calendar/{siteCode}:
    get:
      description: "GET /v1/rentalUnits/calendar/{siteCode} <br> Retrieves calendar\
        \ pricing data for an accommodation, comparing all rental units and returning\
        \ the cheapest price per date+duration combination. <br> The API aggregates\
        \ trips from all rental units for the given month. For each date+duration\
        \ combination, only the cheapest option across all units is returned. Different\
        \ rental units may have different minimum stay requirements, so the number\
        \ of available durations can vary per date. <br> Path Parameters: <br> -\
        \ siteCode: The site code of the accommodation. <br> Query Parameters: <br>\
        \ - month: The month to retrieve pricing for (YYYY-MM format) - Required <br>\
        \ - persons: Number of persons (default: 2) <br> - babies: Number of babies\
        \ (default: 0) <br> - pets: Number of pets (default: 0) <br> Response: <br>\
        \ - 200 OK: Calendar pricing data with cheapest trips grouped by date <br>\
        \ - 400 Bad Request: If month parameter is missing <br> - 404 Not Found:\
        \ If the accommodation is not found"
      parameters:
        - name: "siteCode"
          in: "path"
          required: true
          description: "The site code of the accommodation"
          schema:
            type: "string"
        - name: "month"
          in: "query"
          required: true
          description: "The month to retrieve pricing for in YYYY-MM format (e.g. 2026-07)"
          schema:
            type: "string"
        - name: "persons"
          in: "query"
          required: false
          description: "Number of persons"
          schema:
            type: "integer"
            default: 2
        - name: "babies"
          in: "query"
          required: false
          description: "Number of babies"
          schema:
            type: "integer"
            default: 0
        - name: "pets"
          in: "query"
          required: false
          description: "Number of pets"
          schema:
            type: "integer"
            default: 0
        - name: "hasSelectedStartDateOnPreviousMonth"
          in: "query"
          required: false
          description: "When true, the response includes the previous month's data\
            \ (for when the user selected a check-in date on the previous month and\
            \ navigated forward). When false (default), includes the next month's data."
          schema:
            type: "boolean"
            default: false
      responses:
        "400":
          description: "Bad Request - month parameter is missing"
          content:
            text/plain:
              schema:
                type: "string"
              examples:
                Example#1:
                  value: "400: Bad Request"
        "404":
          description: "Not Found - accommodation not found"
          content:
            text/plain:
              schema:
                type: "string"
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AccommodationCalendarResponse"
