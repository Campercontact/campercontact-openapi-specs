      properties:
        id:
          type: "string"
          description: "Unique identifier of the timeline item"
        type:
          $ref: "#/components/schemas/TimelineType"
          description: "Type of timeline activity"
        createdAt:
          type: "string"
          description: "Creation timestamp of the activity"
        data:
          $ref: "#/components/schemas/TimelineItemData"
          description: "Specific data for the timeline item based on its type"
      required:
        - "id"
        - "type"
        - "createdAt"
        - "data"
    TimelineType:
      type: "string"
      enum: ["location", "photo", "review"]
      description: "Type of activity in the timeline"
    TimelineItemData:
      oneOf:
        - $ref: "#/components/schemas/LocationTimelineData"
        - $ref: "#/components/schemas/PhotoTimelineData"
