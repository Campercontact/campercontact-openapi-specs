  /v1/reviews/analysis/pending:
    get:
      description: "GET /v1/reviews/analysis/pending <br> Retrieves a paginated list\
        \ of reviews that have a pending (unmoderated) analysis where isChangeRequest\
        \ is true. Results are sorted by analysis.createdAt ascending (oldest first).\
        \ <br> Requires authentication. Allowed roles: Moderator, ModeratorChief,\
        \ CustomerService, Admin. <br> Query Parameters: <br> - offset: Number of\
        \ items to skip (default: 0) <br> - limit: Maximum number of items to return\
        \ (default: 250) <br> Response: <br> - 200 OK: A PagedResult containing PendingAnalysisResponse\
        \ items. <br> - 403 Forbidden: The user is not authenticated or lacks the\
        \ required role."
      summary: "Get Pending Review Analyses"
      security:
        - bearerAuth: []
      parameters:
        - name: "offset"
          in: "query"
          required: false
          schema:
            type: "integer"
            default: 0
          description: "Number of items to skip"
        - name: "limit"
          in: "query"
          required: false
          schema:
            type: "integer"
            default: 250
          description: "Maximum number of items to return"
      responses:
        "403":
          description: "Forbidden"
          content:
            text/plain:
              schema:
                type: "string"
              examples:
                Example#1:
                  value: "Forbidden"
        "500":
          description: "Internal Server Error"
          content:
            text/plain:
              schema:
                type: "string"
              examples:
                Example#1:
                  value: "500: Internal Server Error"
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  items:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/PendingAnalysisResponse"
                  total:
                    type: "integer"
                    format: "int64"
                  offset:
                    type: "integer"
                    format: "int64"
                  limit:
                    type: "integer"
