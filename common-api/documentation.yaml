          example: "nl"
        addressTypes:
          type: "array"
          nullable: true
          items:
            type: "string"
          description: "Nominatim address-type tags, e.g. [\"village\", \"state\"]."
        zoom:
          type: "integer"
          format: "int32"
          nullable: true
        lastSync:
          type: "string"
          nullable: true
          description: "ISO-8601 timestamp of when this lookup was performed."
        lastSyncVersion:
