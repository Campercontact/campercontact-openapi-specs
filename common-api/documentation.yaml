        city:
          type: string
          nullable: true
          description: "Localized city name based on Accept-Language header"
          example: "Amsterdam"
        country:
          type: string
          nullable: true
          description: "Localized country name based on Accept-Language header"
          example: "Netherlands"
        region:
          type: string
          nullable: true
          description: "Localized region/province name based on Accept-Language header"
          example: "North Holland"
        cityTranslations:
          type: object
          nullable: true
          description: "City name translations as a map of language codes to translations"
          additionalProperties:
            type: string
          example:
            en: "Amsterdam"
            nl: "Amsterdam"
            de: "Amsterdam"
        countryTranslations:
          type: object
          nullable: true
          description: "Country name translations as a map of language codes to translations"
          additionalProperties:
            type: string
          example:
            en: "Netherlands"
            nl: "Nederland"
            de: "Niederlande"
        regionTranslations:
          type: object
          nullable: true
          description: "Region/province name translations as a map of language codes to translations"
          additionalProperties:
            type: string
          example:
            en: "North Holland"
            nl: "Noord-Holland"
            de: "Nordholland"
        photos:
          type: array
          items:
            $ref: "#/components/schemas/ActivityPhotoResponse"
          description: "Photos attached to this activity"
        reactions:
          $ref: "#/components/schemas/ReactionsResponse"
          description: "Reaction counts for this activity"
        userReaction:
          type: string
          nullable: true
          description: "The reaction type the authenticated user gave to this activity (e.g. 'cool', 'super', 'awesome', 'fun', 'traveling'), or null if not reacted"
          example: "cool"
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
    ActivityPhotoResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        photoUrl:
          type: string
          description: "URL of the photo"
    ReactionsResponse:
      type: object
      description: "Reaction counts broken down by type"
      properties:
        totalReactions:
          type: integer
          description: "Total number of reactions across all types"
        cool:
          type: integer
        super:
          type: integer
        awesome:
          type: integer
        fun:
          type: integer
        traveling:
          type: integer
    JourneyStatsResponse:
      type: object
      description: "Reaction and favorite counts for a journey"
      properties:
        reactions:
          $ref: "#/components/schemas/ReactionsResponse"
        totalFavorites:
          type: integer
          description: "Total number of favorites for this journey"
    JourneyAuthorResponse:
      type: object
      description: "Information about the journey author"
      properties:
        userId:
          type: string
          format: uuid
          description: "UUID of the user who created this journey"
        displayName:
          type: string
          nullable: true
          description: "Display name of the journey author"
          example: "John Doe"
        profilePhotoUrl:
          type: string
          nullable: true
          description: "URL to the author's profile photo"
          example: "https://images.example.com/users/profile-photo.jpg"
      required:
        - userId
    JourneyUploadRequest:
      type: object
      required:
        - entityId
        - entityType
        - contentType
        - contentLength
      properties:
        entityId:
          type: string
          format: uuid
          description: "UUID of the entity to attach the photo to. For cover photos, must match the journey id."
        entityType:
          type: string
          enum:
            - journey
            - destination
            - activity
          description: "Type of entity: 'journey' for cover photo, 'destination' for destination photo, 'activity' for activity photo"
        contentType:
          type: string
          description: "MIME type of the image (must start with 'image/')"
          example: "image/jpeg"
        contentLength:
          type: integer
          format: int64
          description: "Size of the image in bytes"
    JourneyUploadResponse:
      type: object
      properties:
        uploadUrl:
          type: string
          description: "Presigned S3 URL to upload the file to via PUT"
        mediaId:
          type: string
          format: uuid
          description: "UUID of the created media record"
        photoUrl:
          type: string
          description: "Final URL where the photo will be accessible after upload"
    # ==================== END JOURNEYS SCHEMAS ====================
    ContributionResponse:
      type: "object"
      properties:
        metadata:
          $ref: "#/components/schemas/ContributionMetadata"
          description: "Metadata about the user's contributions including counts and statistics"
        activityTimeline:
          type: "array"
          items:
            $ref: "#/components/schemas/TimelineItemResponse"
          description: "Combined activity timeline of all user contributions sorted by creation date (newest first)"
    ContributionMetadata:
      type: "object"
      properties:
        totalLocations:
          type: "integer"
          description: "Total number of locations created by the user"
        totalReviews:
          type: "integer"
          description: "Total number of reviews posted by the user"
        totalPhotos:
          type: "integer"
          description: "Total number of photos uploaded by the user"
        changeRequests:
          $ref: "#/components/schemas/ChangeRequestContributions"
          description: "Change request contribution statistics"
    ChangeRequestContributions:
      type: "object"
      properties:
        approved:
          type: "integer"
        rejected:
          type: "integer"
    TimelineItemResponse:
      type: "object"
