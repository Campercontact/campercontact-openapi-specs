          description: "Confidence score between 0.0 and 1.0"
          minimum: 0.0
          maximum: 1.0
        metadata:
          $ref: "#/components/schemas/AnalysisMetadata"
      required:
        - "isChangeRequest"
        - "confidence"
        - "metadata"
    ReviewTagAnalysisRequest:
      type: "object"
      properties:
        tags:
          type: "array"
          items:
            type: "string"
        tagConfidence:
          type: "number"
          format: "double"
          nullable: true
          description: "Confidence score between 0.0 and 1.0"
          minimum: 0.0
          maximum: 1.0
        tagComposition:
          type: "object"
          nullable: true
          additionalProperties:
            type: "array"
            items:
              type: "string"
        metadata:
          $ref: "#/components/schemas/TagAnalysisMetadata"
      required:
        - "metadata"
    TagAnalysisMetadata:
      type: "object"
      properties:
        llmVersion:
          type: "string"
        llmType:
          type: "string"
        tagPromptVersion:
          type: "integer"
          format: "int32"
      required:
        - "llmVersion"
        - "llmType"
        - "tagPromptVersion"
    AnalysisMetadata:
      type: "object"
      properties:
        llmVersion:
          type: "string"
        llmType:
          type: "string"
        promptVersion:
          type: "integer"
          format: "int32"
      required:
        - "llmVersion"
        - "llmType"
        - "promptVersion"
    AnalysisCategory:
      type: "string"
      enum:
        - "name"
        - "contactdetails"
        - "prices"
        - "openingperiod"
        - "address"
        - "limits"
        - "amenities"
        - "surroundings"
        - "terrain"
        - "status"
        - "discountcards"
    ModerationStatus:
      type: "string"
      enum:
        - "correct"
        - "incorrect"
    PendingAnalysisResponse:
      type: "object"
      properties:
        reviewId:
          type: "string"
          format: "uuid"
        sitecode:
          type: "string"
        rating:
          type: "integer"
          format: "int32"
          nullable: true
        originalText:
          type: "string"
        originalLocale:
          type: "string"
          description: "The locale of the original review text (e.g. \"nl\", \"en\", \"de\")"
        translations:
          type: "object"
          additionalProperties:
            type: "string"
          description: "Map of language code to translated text (e.g. {\"en\": \"...\", \"de\": \"...\"})"
        userName:
          type: "string"
        profilePictureUrl:
          type: "string"
          nullable: true
        createdAt:
          type: "string"
        analysis:
          $ref: "#/components/schemas/PendingAnalysisResponseAnalysis"
      required:
        - "reviewId"
        - "sitecode"
        - "originalText"
        - "originalLocale"
        - "translations"
        - "userName"
        - "createdAt"
        - "analysis"
    PendingAnalysisResponseAnalysis:
      type: "object"
      properties:
        isChangeRequest:
          type: "boolean"
        category:
          nullable: true
          $ref: "#/components/schemas/AnalysisCategory"
        confidence:
          type: "number"
          format: "double"
        createdAt:
          type: "string"
        moderationStatus:
          nullable: true
          $ref: "#/components/schemas/ModerationStatus"
        metadata:
          $ref: "#/components/schemas/AnalysisMetadata"
      required:
        - "isChangeRequest"
        - "confidence"
        - "createdAt"
        - "metadata"
