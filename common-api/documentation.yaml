          type: "string"
          nullable: true
          description: "Site code of the location"
        name:
          type: "string"
          nullable: true
          description: "Name of the location"
        address:
          $ref: "#/components/schemas/LocalisedAddress"
          nullable: true
          description: "Localised address information"
        status:
          type: "string"
          nullable: true
          description: "Status of the location"
        permalink:
          type: "string"
          nullable: true
          description: "SEO-friendly URL for the location"
    PhotoTimelineData:
