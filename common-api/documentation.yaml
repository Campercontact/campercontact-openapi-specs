  /v1/locations/prices:
    get:
      description: "GET /v1/locations/prices <br> Retrieves all pricing data for a location including location prices and TravelBase rental units.\
        \ This is a separate endpoint for performance - TravelBase calls can be slow.\
        \ <br> Query Parameters: <br> - sitecode: The sitecode of the location (required). <br> -\
        \ startDate: Start date (required, format: YYYY-MM-DD). <br> -\
        \ endDate: End date (required, format: YYYY-MM-DD). <br> -\
        \ persons: Number of persons (optional, default: 2). <br> -\
        \ babies: Number of babies (optional, default: 0). <br> -\
        \ pets: Number of pets (optional, default: 0). <br>\
        \ Response: <br> - 200 OK: LocationPricingResult with prices, rentalUnitLowestPrice, and rental units. <br>\
        \ - 400 Bad Request: If sitecode or required dates are missing. <br> - 404 Not Found: If the location is not found."
      parameters:
        - name: "sitecode"
          in: "query"
          required: true
          schema:
            type: "string"
          description: "The sitecode of the location"
        - name: "startDate"
          in: "query"
          required: true
          schema:
            type: "string"
            format: "date"
          description: "Start date for pricing (format: YYYY-MM-DD)"
        - name: "endDate"
          in: "query"
          required: true
          schema:
            type: "string"
            format: "date"
          description: "End date for pricing (format: YYYY-MM-DD)"
        - name: "persons"
          in: "query"
          required: false
          schema:
            type: "integer"
            default: 2
          description: "Number of persons for rental unit pricing"
        - name: "babies"
          in: "query"
          required: false
          schema:
            type: "integer"
            default: 0
          description: "Number of babies for rental unit pricing"
        - name: "pets"
          in: "query"
          required: false
          schema:
            type: "integer"
            default: 0
          description: "Number of pets for rental unit pricing"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationPricingResult"
