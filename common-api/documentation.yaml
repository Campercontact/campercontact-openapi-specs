  /v1/journeys/{id}/media/request-upload:
    post:
      summary: "Request a presigned upload URL for journey media"
      description: "
        Requests a presigned S3 URL for uploading a photo.
        Use entityType to specify what the photo is for:
        - 'journey': cover photo (entityId must match journey id)
        - 'destination': destination photo (entityId = destination UUID)
        - 'activity': activity photo (entityId = activity UUID)
        Max 5 photos per destination, max 5 photos per activity."
      tags:
        - Journey Media
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JourneyUploadRequest"
      responses:
        "200":
          description: "Upload URL generated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyUploadResponse"
        "400":
          description: "Invalid request or max photos exceeded"
        "401":
          description: "Unauthorized"
        "404":
          description: "Journey, destination, or activity not found"
  /v1/journeys/{id}/media/{mediaId}/upload-success:
    post:
      summary: "Confirm media upload success"
      description: "Confirms that a media file was successfully uploaded to S3. Marks the media as available."
      tags:
        - Journey Media
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
        - name: mediaId
          in: path
          required: true
          description: "Media UUID"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Upload confirmed"
        "400":
          description: "Media does not belong to journey or max photos exceeded"
        "401":
          description: "Unauthorized"
  /v1/journeys/{id}/media/{mediaId}/upload-failed:
    post:
      summary: "Report media upload failure"
      description: "Reports that a media upload failed. Cleans up the media record."
      tags:
        - Journey Media
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
        - name: mediaId
          in: path
          required: true
          description: "Media UUID"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Upload failure recorded"
        "401":
          description: "Unauthorized"
  /v1/journeys/{id}/media/{mediaId}:
    delete:
      summary: "Delete media from journey"
      description: "Deletes a photo from a journey. Works for cover photos, destination photos, and activity photos."
      tags:
        - Journey Media
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
        - name: mediaId
          in: path
          required: true
          description: "Media UUID"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Media deleted"
        "401":
          description: "Unauthorized"
        "404":
          description: "Journey not found or access denied"
  /v1/me/journeys:
    get:
      summary: "Get personal journey data"
      description: "Returns the authenticated user's journey-related personal data: favorited journey IDs, reaction data, and own journey IDs."
      tags:
        - Journeys
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: "Personal journey data"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyJourneysResponse"
        "401":
          description: "Unauthorized - User not authenticated"
        "404":
          description: "User not found"
components:
  schemas:
    # ==================== JOURNEYS SCHEMAS ====================
    CalculateRouteRequest:
      type: object
      required:
        - coordinates
      properties:
        coordinates:
          type: array
          items:
            $ref: "#/components/schemas/Coordinate"
          minItems: 2
          description: "List of coordinates (at least 2)"
        routeOptions:
          $ref: "#/components/schemas/RouteOptions"
        journeyId:
          type: string
          format: uuid
          nullable: true
          description: "Optional journey UUID. If provided, the calculated routeCoordinates are also saved to that journey."
    Coordinate:
      type: object
      required:
        - lat
        - lon
      properties:
        lat:
          type: number
          description: "Latitude"
          example: 52.3676
        lon:
          type: number
          description: "Longitude"
          example: 4.9041
    CreateJourneyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: "Name of the journey"
          example: "Camperreis Turfroute Friesland"
        isDraft:
          type: boolean
          default: true
