  # ==================== JOURNEYS ====================
  /v1/journeys:
    get:
      summary: "Get paginated public journeys"
      description: "Returns a paginated list of journeys with public visibility. Requires authentication."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 250
          description: "Maximum number of journeys to return"
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: "Number of journeys to skip"
      responses:
        "200":
          description: "Paginated list of public journeys"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/JourneyResponse"
                  total:
                    type: integer
                    format: int64
                  offset:
                    type: integer
                    format: int64
                  limit:
                    type: integer
    post:
      summary: "Create a new journey"
      description: "Creates a new journey. Defaults to draft (isDraft=true). Set isDraft to false in the request body to create a finalized journey."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJourneyRequest"
      responses:
        "201":
          description: "Journey created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyResponse"
        "400":
          description: "Bad request - validation error (e.g., more than 3 tags)"
        "401":
          description: "Unauthorized - User not authenticated"
  /v1/journeys/permalink:
    get:
      summary: "Get a public journey by permalink"
      description: "Returns a public journey by its permalink. No authentication required."
      tags:
        - Journeys
      parameters:
        - name: permalink
          in: query
          required: true
          schema:
            type: string
          description: "The journey permalink (e.g. john_doe/journeys/norway-camper-adventure-1)"
      responses:
        "200":
          description: "Journey found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyResponse"
        "403":
          description: "Journey is not public"
        "404":
          description: "Journey not found"
  /v1/journeys/tags:
    get:
      summary: "Get all available journey tags"
      description: "Returns all available tags that can be used when creating or updating a journey."
      tags:
        - Journeys
      responses:
        "200":
          description: "List of available tags"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JourneyTagResponse"
    post:
      summary: "Create a new journey tag"
      description: "Creates a new journey tag. Requires admin permissions (CC_LOCATION_ADMIN role)."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: "Tag created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyTagResponse"
        "403":
          description: "Forbidden - user is not authenticated or does not have admin permissions"
  /v1/journeys/tags/{id}:
    put:
      summary: "Update an existing journey tag"
      description: "Updates an existing journey tag by ID. Requires admin permissions (CC_LOCATION_ADMIN role)."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "The unique identifier of the tag"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTagRequest"
      responses:
        "200":
          description: "Tag updated successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyTagResponse"
        "403":
          description: "Forbidden - user is not authenticated or does not have admin permissions"
        "404":
          description: "Tag not found"
    delete:
      summary: "Delete a journey tag"
      description: "Deletes a journey tag by ID. Requires admin permissions (CC_LOCATION_ADMIN role)."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "The unique identifier of the tag"
      responses:
        "204":
          description: "Tag deleted successfully"
        "403":
          description: "Forbidden - user is not authenticated or does not have admin permissions"
        "404":
          description: "Tag not found"
  /v1/journeys/calculate-route:
    post:
      summary: "Calculate route without saving a journey"
      description: "Calculate route from a list of coordinates. Used for previewing the route while building a journey. Optionally provide journeyId to persist calculated route coordinates on an existing journey."
      tags:
        - Journeys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateRouteRequest"
      responses:
        "200":
          description: "Route calculated successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteInfoResponse"
        "400":
          description: "Bad request - less than 2 locations or coordinates not found"
  /v1/journeys/{id}:
    get:
      summary: "Get journey by ID"
      description: "Retrieves a journey by its ID. Only the owner can access their journey."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Journey found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyResponse"
        "401":
          description: "Unauthorized - User not authenticated"
        "404":
          description: "Journey not found or not owned by user"
    put:
      summary: "Update a journey"
      deprecated: true
      description: "**Deprecated.** Use `PUT /v1/journeys/{id}/details` for metadata updates and the `/v1/journeys/{journeyId}/destinations` endpoints for destination management. Updates an existing journey. The owner can update their own journey. Admin users (CC_LOCATION_ADMIN) can update any journey. When an admin updates another user's journey, the original author is preserved."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJourneyRequest"
      responses:
        "200":
          description: "Journey updated successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyResponse"
        "400":
          description: "Bad request - validation error (e.g., more than 3 tags)"
        "401":
          description: "Unauthorized - User not authenticated"
        "404":
          description: "Journey not found or not owned by user (unless user is admin)"
    delete:
      summary: "Delete a journey"
      description: "Soft-deletes a journey. The owner can delete their own journey. Admin users (CC_LOCATION_ADMIN) can delete any journey."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: "Journey deleted successfully"
        "401":
          description: "Unauthorized - User not authenticated"
        "404":
          description: "Journey not found or not owned by user (unless user is admin)"
  /v1/journeys/{id}/details:
    put:
      summary: "Update journey details"
      description: "Updates only the journey metadata (name, isDraft, isPublic, tags, routeOptions, routeInfo). Does NOT handle destinations or activities — use the dedicated destination and activity endpoints for those. The owner can update their own journey. Admin users (CC_LOCATION_ADMIN) can update any journey."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJourneyDetailsRequest"
      responses:
        "200":
          description: "Journey details updated successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyResponse"
        "400":
          description: "Bad request - validation error (e.g., more than 3 tags)"
        "401":
          description: "Unauthorized - User not authenticated"
        "403":
          description: "Forbidden - User does not own this journey"
        "404":
          description: "Journey not found"
  /v1/journeys/{journeyId}/destinations:
    get:
      summary: "List destinations for a journey"
      description: "Returns all destinations for the given journey. The owner can access their own journeys; public journeys are accessible to any authenticated user; admins can access any journey."
      tags:
        - Journey Destinations
      security:
        - bearerAuth: []
      parameters:
        - name: journeyId
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "List of destinations"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DestinationResponse"
        "401":
          description: "Unauthorized - User not authenticated"
        "403":
          description: "Forbidden - User does not have access to this journey"
        "404":
          description: "Journey not found"
    post:
      summary: "Create a destination"
      description: "Adds a new destination to a journey. The destination is appended to the end (highest order + 1). The owner can add to their own journey; admins can add to any journey."
      tags:
        - Journey Destinations
      security:
        - bearerAuth: []
      parameters:
        - name: journeyId
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDestinationRequest"
      responses:
        "201":
          description: "Destination created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DestinationResponse"
        "400":
          description: "Bad request - validation error"
        "401":
          description: "Unauthorized - User not authenticated"
        "403":
          description: "Forbidden - User does not own this journey"
        "404":
          description: "Journey not found"
  /v1/journeys/{journeyId}/destinations/{destinationId}:
    put:
      summary: "Update a destination"
      description: "Updates an existing destination. Changing the `order` field reorders the destinations within the journey. The owner can update their own journeys; admins can update any."
      tags:
        - Journey Destinations
      security:
        - bearerAuth: []
      parameters:
        - name: journeyId
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
        - name: destinationId
          in: path
          required: true
          description: "Destination UUID"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSingleDestinationRequest"
      responses:
        "200":
          description: "Destination updated successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DestinationResponse"
        "400":
          description: "Bad request - validation error or destination does not belong to journey"
        "401":
          description: "Unauthorized - User not authenticated"
        "403":
          description: "Forbidden - User does not own this journey"
        "404":
          description: "Journey or destination not found"
    delete:
      summary: "Delete a destination"
      description: "Removes a destination from a journey. Remaining destinations are re-ordered to close the gap. The owner can delete from their own journeys; admins can delete from any."
      tags:
        - Journey Destinations
      security:
        - bearerAuth: []
      parameters:
        - name: journeyId
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
        - name: destinationId
          in: path
          required: true
          description: "Destination UUID"
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: "Destination deleted successfully"
        "400":
          description: "Bad request - destination does not belong to journey"
        "401":
          description: "Unauthorized - User not authenticated"
        "403":
          description: "Forbidden - User does not own this journey"
        "404":
          description: "Journey or destination not found"
  /v1/journeys/{id}/copy:
    post:
      summary: "Copy a journey"
      description: "Creates a deep copy of a journey including destinations, activities, photos, and tags. The copy is created as a private draft owned by the authenticated user, with a reference to the source journey."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Source journey UUID to copy from"
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: "Journey copied successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyResponse"
        "401":
          description: "Unauthorized - User not authenticated"
        "404":
          description: "Source journey not found"
  /v1/journeys/{id}/reactions:
    post:
      summary: "Toggle a reaction on a journey"
      description: "
        Toggle a reaction on a public journey. Any authenticated user can react.
        - If no existing reaction: adds the reaction.
        - If same reaction type already exists: removes it (toggle off).
        - If different reaction type exists: updates to the new type.
        - Private journeys cannot be reacted to."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleReactionRequest"
      responses:
        "200":
          description: "Reaction toggled successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToggleReactionResponse"
        "400":
          description: "Bad request - invalid reaction type"
        "401":
          description: "Unauthorized - User not authenticated"
        "403":
          description: "Forbidden - Journey is not public"
        "404":
          description: "Journey not found"
  /v1/journeys/{id}/destinations/{destinationId}/reactions:
    post:
      summary: "Toggle a reaction on a journey destination"
      description: "
        Toggle a reaction on a destination within a public journey. Any authenticated user can react.
        - If no existing reaction: adds the reaction.
        - If same reaction type already exists: removes it (toggle off).
        - If different reaction type exists: updates to the new type.
        - Private journeys cannot be reacted to.
        - Destination must belong to the specified journey."
      tags:
        - Journeys
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "Journey UUID"
          schema:
            type: string
            format: uuid
        - name: destinationId
          in: path
          required: true
          description: "Destination UUID"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleReactionRequest"
      responses:
        "200":
          description: "Reaction toggled successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToggleReactionResponse"
        "400":
          description: "Bad request - invalid reaction type or destination not part of journey"
        "401":
          description: "Unauthorized - User not authenticated"
        "403":
          description: "Forbidden - Journey is not public"
        "404":
          description: "Destination or journey not found"
  /v1/journeys/{journeyId}/destinations/{destinationId}/activities:
